services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leasepulse
      POSTGRES_PASSWORD: leasepulse
      POSTGRES_DB: leasepulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leasepulse -d leasepulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  bootstrap:
    build: .
    command: bash scripts/docker_bootstrap.sh
    environment:
      DATABASE_URL: postgresql://leasepulse:leasepulse@postgres:5432/leasepulse
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: "no"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://leasepulse:leasepulse@postgres:5432/leasepulse
      REDIS_URL: redis://redis:6379/0
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./data:/app/data

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://leasepulse:leasepulse@postgres:5432/leasepulse
      API_BASE_URL: http://api:8000
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      api:
        condition: service_started
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
