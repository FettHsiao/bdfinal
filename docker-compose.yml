services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leasepulse
      POSTGRES_PASSWORD: leasepulse
      POSTGRES_DB: leasepulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://leasepulse:leasepulse@postgres:5432/leasepulse
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ./data:/app/data

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://leasepulse:leasepulse@postgres:5432/leasepulse
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
